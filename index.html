<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spiderdex Official</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .spider-gradient { background: linear-gradient(135deg, #0f172a 0%, #020617 100%); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="spider-gradient min-h-screen text-slate-200 p-4 font-sans">
<div class="max-w-md mx-auto space-y-6 pb-20">
    <header class="text-center py-8">
        <h1 class="text-5xl font-black tracking-tighter text-white italic">SPIDERDEX</h1>
        <div class="flex justify-center space-x-6 mt-6">
            <button onclick="showView('capture')" id="nav-capture" class="text-[10px] font-black uppercase tracking-widest border-b-2 border-sky-500 pb-1 text-white">Capture</button>
            <button onclick="showView('gallery')" id="nav-gallery" class="text-[10px] font-black uppercase tracking-widest border-b-2 border-transparent pb-1 text-slate-500">Archives</button>
        </div>
    </header>

    <div id="view-capture" class="space-y-6">
        <main class="bg-slate-900/80 border border-slate-800 p-6 rounded-3xl shadow-2xl space-y-5 backdrop-blur-md">
            <input type="file" id="spiderInput" accept="image/*" capture="environment" class="w-full text-xs text-slate-400 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-[10px] file:font-black file:bg-sky-600 file:text-white">
            <input type="text" id="locationInput" placeholder="Austin, TX" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-sm text-white outline-none">
            <button onclick="submitSighting()" id="submitBtn" class="w-full bg-sky-600 hover:bg-sky-500 text-white font-black py-4 rounded-xl uppercase tracking-widest text-xs transition-all">Transmit Data</button>
        </main>

        <div id="resultArea" class="hidden space-y-6">
            <div class="bg-slate-900 border border-slate-800 rounded-3xl overflow-hidden shadow-2xl">
                <div class="bg-sky-600/10 p-6 border-b border-slate-800">
                    <h3 id="spiderTitle" class="text-white font-black uppercase text-2xl tracking-tighter"></h3>
                    <p id="sciName" class="text-slate-500 italic text-sm"></p>
                </div>
                <div id="statsContainer" class="p-6 space-y-4"></div>
                <div class="p-6 bg-slate-950 border-t border-slate-800">
                    <p id="overallRank" class="text-sky-500 font-black text-2xl mb-1"></p>
                    <p id="verdictText" class="text-white font-bold text-sm italic border-l-2 border-sky-600 pl-3"></p>
                </div>
            </div>
            <img id="resultImage" class="w-full rounded-3xl border border-slate-800">
        </div>
    </div>

    <div id="view-gallery" class="hidden space-y-8 animate-in fade-in">
        <div id="galleryContainer" class="space-y-12"></div>
    </div>
</div>

<script>
    const SUPABASE_URL = '%%SUPABASE_URL%%';
    const ANON_KEY = '%%SUPABASE_ANON_KEY%%';

    function showView(view) {
        const isCap = view === 'capture';
        document.getElementById('view-capture').classList.toggle('hidden', !isCap);
        document.getElementById('view-gallery').classList.toggle('hidden', isCap);
        document.getElementById('nav-capture').className = isCap ? 'text-[10px] font-black uppercase tracking-widest border-b-2 border-sky-500 pb-1 text-white' : 'text-[10px] font-black uppercase tracking-widest border-b-2 border-transparent pb-1 text-slate-500';
        document.getElementById('nav-gallery').className = !isCap ? 'text-[10px] font-black uppercase tracking-widest border-b-2 border-sky-500 pb-1 text-white' : 'text-[10px] font-black uppercase tracking-widest border-b-2 border-transparent pb-1 text-slate-500';
        if (view === 'gallery') fetchGallery();
    }

    function renderStats(sp) {
        const cats = [
            { l: 'Coolness', r: sp.coolness_tier, rs: sp.coolness_reason },
            { l: 'Danger', r: sp.danger_tier, rs: sp.danger_reason },
            { l: 'Rarity', r: sp.rarity_tier, rs: sp.rarity_reason },
            { l: 'Beauty', r: sp.beauty_tier, rs: sp.beauty_reason }
        ];
        return cats.map(c => `
                <div class="flex items-baseline space-x-2">
                    <span class="text-white font-black text-[10px] uppercase w-16 flex-shrink-0">${c.l}:</span>
                    <span class="text-sky-500 font-black italic text-sm">${c.r} —</span>
                    <span class="text-slate-400 text-xs leading-tight">${c.rs}</span>
                </div>`).join('');
    }

    async function fetchGallery() {
        const container = document.getElementById('galleryContainer');
        try {
            const res = await fetch(`${SUPABASE_URL}/functions/v1/get-gallery`, { headers: { 'Authorization': `Bearer ${ANON_KEY}` } });
            const list = await res.json();
            container.innerHTML = list.map(sp => `
                    <div class="space-y-4">
                        <div class="border-l-2 border-sky-900 pl-4">
                            <h4 class="text-white font-black text-xl uppercase tracking-tighter">${sp.common_name}</h4>
                            <p class="text-sky-500 text-[10px] font-black italic uppercase">${sp.scientific_name} • RANK ${sp.overall_tier}</p>
                        </div>
                        <div class="px-4 space-y-2">${renderStats(sp)}</div>
                        <div class="flex overflow-x-auto space-x-3 no-scrollbar pb-2">
                            ${sp.sightings.map(s => `<img src="${s.image_url}" class="h-64 w-48 object-cover rounded-2xl border border-slate-800 flex-none">`).join('')}
                        </div>
                    </div>`).join('');
        } catch (err) { container.innerHTML = `<p class="text-red-500">${err.message}</p>`; }
    }

    async function submitSighting() {
        const btn = document.getElementById('submitBtn');
        const file = document.getElementById('spiderInput').files[0];
        if (!file) return;

        btn.disabled = true; btn.innerText = "TRANSMITTING...";
        const fd = new FormData();
        fd.append('image', file);
        fd.append('location', document.getElementById('locationInput').value || "Austin, TX");

        try {
            const res = await fetch(`${SUPABASE_URL}/functions/v1/log-sighting`, {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${ANON_KEY}` },
                body: fd
            });
            const data = await res.json();
            if (data.success) {
                const s = data.stats;
                document.getElementById('spiderTitle').innerText = s.common_name;
                document.getElementById('sciName').innerText = s.scientific_name;
                document.getElementById('overallRank').innerText = s.overall_tier;
                document.getElementById('verdictText').innerText = s.verdict;
                document.getElementById('statsContainer').innerHTML = renderStats(s);
                document.getElementById('resultImage').src = data.imageUrl;
                document.getElementById('resultArea').classList.remove('hidden');
                btn.innerText = "ENTRY ARCHIVED";
            }
        } catch (err) { btn.disabled = false; btn.innerText = "RETRY"; alert(err.message); }
    }
</script>
</body>
</html>
