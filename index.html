<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spiderdex Official</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .spider-gradient { background: linear-gradient(135deg, #0f172a 0%, #020617 100%); }
    </style>
</head>
<body class="spider-gradient min-h-screen text-slate-200 p-4 font-sans">

<div class="max-w-md mx-auto space-y-6">
    <header class="text-center py-8">
        <h1 class="text-5xl font-black tracking-tighter text-white italic">SPIDERDEX</h1>
        <p class="text-sky-500 text-xs font-bold uppercase tracking-[0.3em] mt-2">Bio-Hazard Field Entry</p>
    </header>

    <main class="bg-slate-900/80 border border-slate-800 p-6 rounded-3xl shadow-2xl backdrop-blur-sm space-y-5">
        <div>
            <label class="block text-[10px] font-black text-slate-500 uppercase tracking-widest mb-2">Visual Capture</label>
            <input type="file" id="spiderInput" accept="image/*" capture="environment"
                   class="w-full text-sm text-slate-400 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-bold file:bg-sky-600 file:text-white hover:file:bg-sky-500 cursor-pointer">
        </div>

        <div class="grid grid-cols-2 gap-4">
            <div class="col-span-2">
                <label class="block text-[10px] font-black text-slate-500 uppercase tracking-widest mb-2">Location Coordinates</label>
                <input type="text" id="locationInput" placeholder="Austin, TX"
                       class="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-white focus:ring-2 focus:ring-sky-500 outline-none placeholder:text-slate-700">
            </div>
        </div>

        <div>
            <label class="block text-[10px] font-black text-slate-500 uppercase tracking-widest mb-2">Field Notes</label>
            <textarea id="notesInput" placeholder="Aggression levels, web patterns..."
                      class="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-white focus:ring-2 focus:ring-sky-500 outline-none h-24 placeholder:text-slate-700"></textarea>
        </div>

        <button onclick="submitSighting()" id="submitBtn"
                class="w-full bg-sky-600 hover:bg-sky-500 text-white font-black py-4 rounded-xl transition-all shadow-lg shadow-sky-900/40 uppercase tracking-widest text-sm">
            Transmit Data
        </button>
    </main>

    <div id="resultArea" class="hidden space-y-4 animate-in fade-in slide-in-from-bottom-4 duration-700">
        <div class="bg-slate-900 border border-sky-900/50 p-6 rounded-3xl">
            <div class="flex items-center space-x-2 mb-4">
                <div class="h-2 w-2 rounded-full bg-sky-500 animate-pulse"></div>
                <h3 class="text-sky-400 font-black text-xs uppercase tracking-widest">Classification Received</h3>
            </div>
            <div id="reportContent" class="text-xs leading-relaxed whitespace-pre-wrap font-mono text-slate-400"></div>
        </div>
        <img id="resultImage" class="w-full rounded-3xl border border-slate-800 transition-all duration-500 shadow-2xl">    ]
    </div>
</div>

<script>
    // These are injected by GitHub Actions at deployment
    const SUPABASE_URL = '%%SUPABASE_URL%%';
    const ANON_KEY = '%%SUPABASE_ANON_KEY%%';

    async function submitSighting() {
        const fileInput = document.getElementById('spiderInput');
        const btn = document.getElementById('submitBtn');
        const resultArea = document.getElementById('resultArea');

        if (!fileInput.files[0]) return alert("Critical Error: Image Missing");

        btn.disabled = true;
        btn.innerText = "ANALYZING...";
        btn.classList.add('opacity-50', 'cursor-not-allowed');

        const formData = new FormData();
        formData.append('image', fileInput.files[0]);
        formData.append('location', document.getElementById('locationInput').value || "Austin, TX");
        formData.append('notes', document.getElementById('notesInput').value);

        try {
            const response = await fetch(`${SUPABASE_URL}/functions/v1/log-sighting`, {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${ANON_KEY}` },
                body: formData
            });

            const data = await response.json();

            if (data.success) {
                document.getElementById('reportContent').innerText = data.report;
                document.getElementById('resultImage').src = data.imageUrl;
                resultArea.classList.remove('hidden');
                btn.innerText = "TRANSMISSION COMPLETE";
            } else {
                throw new Error(data.error);
            }
        } catch (err) {
            console.error(err);
            btn.disabled = false;
            btn.innerText = "RETRY TRANSMISSION";
            btn.classList.remove('opacity-50', 'cursor-not-allowed');
        }
    }
</script>
</body>
</html>
